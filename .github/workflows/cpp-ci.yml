name: C++ CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libz3-dev python3 python3-pip python3-venv

      - name: Install Python test dependencies
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install z3-solver

      - name: Configure
        run: cmake --preset debug

      - name: Build
        run: cmake --build --preset debug -j2

      - name: Test
        run: ctest --test-dir build/debug --output-on-failure
